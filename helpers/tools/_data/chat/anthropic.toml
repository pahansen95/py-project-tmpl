# Anthropic Provider Configuration
# Version: 1.3
# Last Updated: 2025-06-11

[provider]
name = "Anthropic"
api_key = "${env:ANTHROPIC_API_KEY}"
default_model = "claude-3-5-sonnet"

[provider.connection]
base_url = "https://api.anthropic.com/v1"
headers = { }  # Auth headers are handled separately

[provider.opts]
# Optional: Configure beta features and API version
anthropic_version = "2023-06-01"
beta = ["prompt-caching-2024-07-31"]  # Add beta features as needed

[provider.endpoints]
chat = "/messages"
models = "/models"

# ===========================
# Claude 4 Series (Latest 2025)
# ===========================

[[provider.models]]
name = "claude-opus-4"
id = "claude-opus-4-20250514"
limits.input_tokens = 200000
limits.output_tokens = 4096
limits.context_window = 200000
limits.rate_limit = 50
cost.input = 15.00
cost.output = 75.00
cost.per_tokens = 1000000
cost.currency = "USD"
capabilities = ["reasoning", "text", "image"]
opts.temperature = 1.0
opts.top_p = 0.999
opts.max_output_tokens = 4096

[[provider.models]]
name = "claude-sonnet-4"
id = "claude-sonnet-4-20250514"
limits.input_tokens = 200000
limits.output_tokens = 4096
limits.context_window = 200000
limits.rate_limit = 50
