# ===========================
# Required Profiles
# ===========================

[[profiles]]
name = "oneshot"
description = "General-purpose tasks without reasoning"
model = "claude-opus-4"
temperature = 0.8
max_output_tokens = 16384

[[profiles]]
name = "oneshot-fast"
description = "Rapid responses without reasoning"
model = "claude-sonnet-4"
temperature = 0.7
max_output_tokens = 2048

[[profiles]]
name = "reason"
description = "Brief chain-of-thought reasoning"
model = "claude-sonnet-4"
max_output_tokens = 4096

[[profiles]]
name = "reason-high"
description = "Extended chain-of-thought reasoning"
model = "claude-opus-4"
max_output_tokens = 4096

# ===========================
# Custom Profiles
# ===========================

[[profiles]]
name = "code"
description = "Maximum reasoning for complex code generation"
model = "claude-opus-4"
temperature = 0.1
max_output_tokens = 4096

[[profiles]]
name = "code-fast"
description = "Fast reasoning for code generation and analysis"
model = "claude-sonnet-4"
temperature = 0.1
max_output_tokens = 4096