# ===========================
# Usage Profiles
# ===========================

[[profiles]]
name = "budget"
description = "Cost-optimized profile for high-volume processing"
model = "claude-3-5-haiku"
temperature = 0.7
max_output_tokens = 2048

[[profiles]]
name = "quality"
description = "Quality-optimized profile for complex tasks"
model = "claude-opus-4"
temperature = 0.8
max_output_tokens = 4096

[[profiles]]
name = "reasoning"
description = "Reasoning profile for analytical tasks"
model = "claude-opus-4"
max_output_tokens = 4096
anthropic_beta = ["interleaved-thinking-2025-05-14"]

[[profiles]]
name = "fast"
description = "Fast response profile"
model = "claude-3-5-haiku"
temperature = 0.7
max_output_tokens = 1024

[[profiles]]
name = "extended"
description = "Extended output profile for long-form content"
model = "claude-3-7-sonnet"
temperature = 0.8
max_output_tokens = 64000
anthropic_beta = ["output-128k-2025-02-19"]