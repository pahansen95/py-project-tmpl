# ===========================
# Usage Profiles
# ===========================

[[profiles]]
name = "budget"
description = "Cost-optimized profile for high-volume processing"
model = "gpt-4.1-nano"
temperature = 0.7
max_output_tokens = 2048

[[profiles]]
name = "quality"
description = "Quality-optimized profile for complex tasks"
model = "gpt-4.1"
temperature = 0.8
max_output_tokens = 4096

[[profiles]]
name = "reasoning"
description = "Reasoning profile for analytical tasks"
model = "o3"
reasoning_effort = "high"
max_output_tokens = 100000

[[profiles]]
name = "fast"
description = "Fast response profile"
model = "gpt-4o-mini"
temperature = 0.7
max_output_tokens = 1024

[[profiles]]
name = "creative"
description = "Creative content generation"
model = "gpt-4o"
temperature = 0.9
top_p = 0.98
max_output_tokens = 8192
frequency_penalty = 0.5
presence_penalty = 0.5

[[profiles]]
name = "code"
description = "Code generation and technical content"
model = "gpt-4o"
temperature = 0.1
top_p = 0.95
max_output_tokens = 16384

[[profiles]]
name = "json"
description = "Structured JSON output generation"
model = "gpt-4o-mini"
temperature = 0.2
top_p = 0.9
max_output_tokens = 4096
response_format = { type = "json_object" }