# Azure OpenAI Provider Configuration
# Version: 1.1
# Last Updated: 2025-06-11

[provider]
name = "Azure OpenAI"
api_key = "${AZURE_OPENAI_API_KEY}"
default_model = "gpt-4o"

[provider.connection]
# Replace {resource-name} with your actual Azure OpenAI resource name
base_url = "https://{resource-name}.openai.azure.com"
headers = { "Content-Type" = "application/json", "User-Agent" = "LLM-Provider/1.0" }

[provider.opts]
# Azure-specific configuration options
api_version = "2024-10-21"              # Latest stable GA version
deployment_type = "standard"            # standard, provisioned, global
region = "${AZURE_REGION}"              # Your Azure region
retry_after_header = "x-ms-retry-after-ms"
stream_support = true

[provider.endpoints]
# Azure requires deployment-id in the path
chat = "/openai/deployments/{deployment-id}/chat/completions?api-version=${api_version}"
models = "/openai/deployments?api-version=${api_version}"  # Deprecated - use Azure Portal

# ===========================
# GPT-4.1 Series (Latest 2025)
# ===========================

[[provider.models]]
name = "gpt-4.1"
id = "gpt-4.1"
limits.input_tokens = 1047576
limits.output_tokens = 32768
limits.context_window = 1047576
limits.rate_limit = 600
cost.input = 3.00
cost.output = 12.00
cost.per_tokens = 1000000
cost.currency = "USD"
capabilities = ["oneshot", "text", "image"]
opts.temperature = 1.0
opts.top_p = 1.0
opts.max_output_tokens = 32768

[[provider.models]]
name = "gpt-4.1-mini"
