# Azure OpenAI Provider Configuration
# Version: 1.3
# Last Updated: 2025-06-11

[provider]
name = "Azure OpenAI"
api_key = "${env:AZURE_OPENAI_API_KEY}"
default_model = "gpt-4o"

[provider.connection]
# Base URL constructed from resource name in opts
base_url = "https://${self:provider.opts.resource_name}.openai.azure.com"
headers = { "Content-Type" = "application/json", "User-Agent" = "LLM-Provider/1.0" }

[provider.opts]
# Azure-specific configuration options
resource_name = "${env:AZURE_OPENAI_RESOURCE_NAME}"  # Your Azure OpenAI resource name
api_version = "2024-10-21"              # Latest stable GA version
deployment_type = "standard"            # standard, provisioned, global
region = "${env:AZURE_REGION}"              # Your Azure region
retry_after_header = "x-ms-retry-after-ms"
stream_support = true

[provider.endpoints]
# Azure requires deployment-id in the path; this will be injected at runtime based on the model selected;
chat = "/openai/deployments/{deployment_id}/chat/completions?api-version=${self:provider.opts.api_version}"
models = "/openai/deployments?api-version=${self:provider.opts.api_version}"  # Deprecated - use Azure Portal

# ===========================
# GPT-4.1 Series (Latest 2025)
# ===========================

[[provider.models]]
name = "gpt-4.1"
id = "gpt-4.1"
limits.input_tokens = 1047576
limits.output_tokens = 32768
limits.context_window = 1047576
limits.rate_limit = 600
cost.input = 3.00
cost.output = 12.00
cost.per_tokens = 1000000
cost.currency = "USD"
capabilities = ["oneshot", "text", "image"]
opts.temperature = 1.0
opts.top_p = 1.0
opts.max_output_tokens = 32768

