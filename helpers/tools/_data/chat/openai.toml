# ===========================
# Reasoning Models (o-series)
# ===========================

[[provider.models]]
name = "o3"
id = "o3"
limits.input_tokens = 200000
limits.output_tokens = 100000
limits.context_window = 200000
limits.rate_limit = 500
cost.input = 2.00
cost.output = 8.00
cost.per_tokens = 1000000
cost.currency = "USD"
capabilities = ["reasoning", "text"]
# o-series models have fixed parameters
opts.temperature = 1.0
opts.top_p = 1.0
opts.reasoning_effort = "medium"  # low, medium, high

