# OpenAI Provider Configuration
# Version: 1.1
# Last Updated: 2025-06-11

[provider]
name = "OpenAI"
api_key = "${OPENAI_API_KEY}"
default_model = "gpt-4.1"

[provider.connection]
base_url = "https://api.openai.com/v1"
headers = { }  # Auth headers are handled separately

[provider.opts]
# Optional: Set these if you belong to an organization or want to scope to a project
organization = "${OPENAI_ORG_ID}"     # Format: org-xxxxxxxxxxxxxxxxxxxxxx
project = "${OPENAI_PROJECT_ID}"      # Format: proj-xxxxxxxxxxxxxxxxxxxxxx

[provider.endpoints]
chat = "/chat/completions"
models = "/models"

# ===========================
# GPT-4.1 Series (Latest 2025)
# ===========================

[[provider.models]]
name = "gpt-4.1"
id = "gpt-4.1"
limits.input_tokens = 1000000
limits.output_tokens = 32768
limits.context_window = 1000000
limits.rate_limit = 5000
cost.input = 3.00
cost.output = 12.00
cost.per_tokens = 1000000
cost.currency = "USD"
capabilities = ["oneshot", "text", "image"]
opts.temperature = 1.0
opts.top_p = 1.0
opts.max_output_tokens = 32768

[[provider.models]]
name = "gpt-4.1-mini"
id = "gpt-4.1-mini"
limits.input_tokens = 1000000
limits.output_tokens = 32768
limits.context_window = 1000000
limits.rate_limit = 5000
cost.input = 0.75
cost.output = 3.00
cost.per_tokens = 1000000
cost.currency = "USD"
capabilities = ["oneshot", "text", "image"]
opts.temperature = 1.0
opts.top_p = 1.0
opts.max_output_tokens = 32768

[[provider.models]]
name = "gpt-4.1-nano"
id = "gpt-4.1-nano"
limits.input_tokens = 1000000
limits.output_tokens = 32768
limits.context_window = 1000000
limits.rate_limit = 5000
