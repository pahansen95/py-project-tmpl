# ===========================
# Required Profiles
# ===========================

[[profiles]]
name = "oneshot"
description = "General-purpose tasks without reasoning"
model = "gpt-4.1"
temperature = 0.8
max_output_tokens = 8192

[[profiles]]
name = "oneshot-fast"
description = "Rapid responses without reasoning"
model = "gpt-4.1-nano"
temperature = 0.7
max_output_tokens = 2048

[[profiles]]
name = "reason"
description = "Brief chain-of-thought reasoning"
model = "o4-mini"
reasoning_effort = "medium"
max_output_tokens = 10000

[[profiles]]
name = "reason-high"
description = "Extended chain-of-thought reasoning"
model = "o3"
reasoning_effort = "high"
max_output_tokens = 100000

# ===========================
# Custom Profiles
# ===========================

[[profiles]]
name = "code"
description = "Maximum reasoning for complex code generation"
model = "o3-pro"
temperature = 0.1
reasoning_effort = "high"
max_output_tokens = 100000

[[profiles]]
name = "code-fast"
description = "Fast reasoning for code generation and analysis"
model = "codex-mini-latest"
temperature = 0.1
reasoning_effort = "low"
max_output_tokens = 50000