site_name: Python Project Template
site_description: A modern Python project template with comprehensive developer documentation
site_url: https://github.com/pahansen95/py-project-tmpl

nav:
  - Home: index.md
  - Welcome Guide:
    - Overview: welcome/index.md
    - Setup: welcome/setup.md
    - Workflow: welcome/workflow.md
    - Reference: welcome/reference.md
    - Quick Reference Card: welcome/quick-reference-card.md
  - API Documentation:
    - Overview: api/index.md
    - Modules: api/modules.md
  - Technical Documentation:
    - Python API Specification: PyAPISpec.md
    - Automated Development: AutomatedDevelopment.md

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/welcome-progress-tree.css

extra_javascript:
  - javascripts/platform-tabs.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pahansen95/py-project-tmpl

repo_url: https://github.com/pahansen95/py-project-tmpl
repo_name: pahansen95/py-project-tmpl
